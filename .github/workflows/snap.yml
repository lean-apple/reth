# Minimal CI for the snap/2 work: builds and runs the snap, eth-wire and session tests
# (including the live EthSnapStream end-to-end test) on ubuntu-latest, plus a compile check of the
# snap sync stage. Much lighter than the full unit matrix for fast feedback on this branch.
name: snap

on:
  pull_request:
  push:
    branches: [feat/snap2-protocol]

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  snap-tests:
    name: snap tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUST_BACKTRACE: 1
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
      - run: .github/scripts/install_llvm.sh ubuntu
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2.81.9
        with:
          tool: nextest
      - name: snap / eth-wire / session tests
        run: |
          cargo nextest run --locked --no-fail-fast \
            -p reth-eth-wire-types -p reth-eth-wire -p reth-network \
            -E 'test(snap) or test(/session/)'
      - name: snap sync stage compiles
        run: cargo check --locked -p reth-stages
